<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="お弁当在庫">
<meta name="theme-color" content="#f5f0e8">
<title>お弁当在庫管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #fffef9;
  --surface2: #f0ebe0;
  --border: #d8d0c0;
  --text: #2a2318;
  --text2: #7a6e5e;
  --text3: #b0a898;
  --green: #3a7d5a;
  --green-bg: #e8f4ed;
  --green-text: #1f5c3a;
  --dot-active: #3a7d5a;
  --dot-eaten: #ddd8ce;
  --dot-text-active: #ffffff;
  --dot-text-eaten: #b0a898;
  --danger: #c0392b;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ヘッダー */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  padding-top: calc(16px + env(safe-area-inset-top));
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: .02em; }
.header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* タブ */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: calc(60px + env(safe-area-inset-top));
  z-index: 9;
}
.tab {
  flex: 1;
  padding: 10px 0;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  color: var(--text2);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
}
.tab.active { color: var(--green); border-bottom-color: var(--green); }

/* コンテンツ */
.content { padding: 16px; }

/* 在庫カード */
.stock-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.stock-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px 10px;
}
.stock-icon { font-size: 22px; flex-shrink: 0; }
.stock-name { font-size: 15px; font-weight: 700; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stock-count { font-size: 13px; color: var(--text2); flex-shrink: 0; }
.dots-area { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 5px; }
.dot {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  line-height: 1.1;
  flex-shrink: 0;
}
.dot.active { background: var(--dot-active); }
.dot.eaten { background: var(--dot-eaten); }
.dot-month { font-size: 8px; font-weight: 500; }
.dot.active .dot-month { color: rgba(255,255,255,.8); }
.dot.eaten .dot-month { color: var(--dot-text-eaten); }
.dot-day { font-size: 12px; font-weight: 700; }
.dot.active .dot-day { color: #fff; }
.dot.eaten .dot-day { color: var(--dot-text-eaten); }
.stock-footer {
  display: flex;
  border-top: 1px solid var(--border);
}
.eat-btn {
  flex: 1;
  padding: 11px 0;
  font-size: 14px;
  font-weight: 700;
  color: var(--green-text);
  background: var(--green-bg);
  border: none;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.eat-btn:active { background: #d0e8d8; }
.eat-btn:disabled { opacity: .35; cursor: not-allowed; }
.add-stock-btn {
  width: 48px;
  border: none;
  border-left: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 20px;
  cursor: pointer;
  transition: background .15s;
}
.add-stock-btn:active { background: var(--surface2); }
.del-btn {
  width: 48px;
  border: none;
  border-left: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.del-btn:active { background: #fdecea; color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
  line-height: 1.8;
}
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* 登録フォーム */
.form-section { margin-bottom: 20px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; letter-spacing: .04em; }
.form-input {
  width: 100%;
  height: 46px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 15px;
  padding: 0 14px;
  font-family: inherit;
  appearance: none;
}
.form-input:focus { outline: none; border-color: var(--green); }
.form-row { display: flex; gap: 10px; }
.form-row .form-section { flex: 1; margin-bottom: 0; }
.submit-btn {
  width: 100%;
  height: 50px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--green);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 20px;
  transition: background .15s;
}
.submit-btn:active { background: #2d6347; }

/* ログ */
.log-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.log-text { color: var(--text2); }
.log-time { color: var(--text3); font-size: 11px; flex-shrink: 0; margin-left: 8px; }

/* モーダル */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 480px;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-cancel {
  flex: 1; height: 46px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); font-size: 15px; font-family: inherit; cursor: pointer;
}
.modal-ok {
  flex: 2; height: 46px; border-radius: var(--radius-sm);
  border: none; background: var(--green);
  color: #fff; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer;
}

/* トースト */
.toast {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 99px;
  white-space: nowrap;
  transition: transform .3s ease, opacity .3s ease;
  opacity: 0;
  z-index: 200;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🍱 お弁当在庫管理</h1>
  <div class="header-sub" id="header-sub">読み込み中…</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('stock')">在庫一覧</button>
  <button class="tab" onclick="switchTab('register')">作り置き登録</button>
  <button class="tab" onclick="switchTab('log')">ログ</button>
</div>

<div class="content" id="tab-stock"></div>
<div class="content" id="tab-register" style="display:none;">
  <div class="form-section">
    <label class="form-label">お弁当の名前</label>
    <input class="form-input" type="text" id="new-name" placeholder="例：きのこ弁当" list="menu-dl" />
    <datalist id="menu-dl"></datalist>
  </div>
  <div class="form-row">
    <div class="form-section">
      <label class="form-label">個数</label>
      <input class="form-input" type="number" id="new-count" value="5" min="1" max="30" />
    </div>
    <div class="form-section">
      <label class="form-label">作った日付</label>
      <input class="form-input" type="date" id="new-date" />
    </div>
  </div>
  <button class="submit-btn" onclick="addStock()">登録する</button>
</div>
<div class="content" id="tab-log" style="display:none;"></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">個数を追加</div>
    <div class="form-section" style="margin-bottom:12px;">
      <label class="form-label">追加する個数</label>
      <input class="form-input" type="number" id="modal-count" value="5" min="1" max="30" />
    </div>
    <div class="form-section">
      <label class="form-label">作った日付</label>
      <input class="form-input" type="date" id="modal-date" />
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-ok" onclick="confirmModal()">追加する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'bento_pwa_v1';
let state = { items: [], log: [] };
let modalTarget = null;
let currentTab = 'stock';

const ICON_MAP = [
  { words: ['きのこ','キノコ','しいたけ','椎茸','まいたけ','舞茸','えのき','エノキ','なめこ','マッシュルーム','mushroom'], icon: '🍄' },
  { words: ['から揚げ','唐揚げ','から揚','karaage'], icon: '🍗' },
  { words: ['鶏','チキン','chicken'], icon: '🍗' },
  { words: ['鮭','サーモン','salmon','さけ'], icon: '🐟' },
  { words: ['魚','さかな','fish','さば','鯖','ぶり','鰤','ひらめ','たら','鱈'], icon: '🐟' },
  { words: ['エビ','えび','shrimp','海老'], icon: '🦐' },
  { words: ['肉じゃが'], icon: '🥔' },
  { words: ['ハンバーグ','hamburg'], icon: '🍔' },
  { words: ['卵','玉子','たまご','オムライス'], icon: '🥚' },
  { words: ['野菜','ベジ','veget'], icon: '🥦' },
  { words: ['豚','ぶた','pork','生姜焼き','しょうが焼き'], icon: '🥩' },
  { words: ['牛','beef','すき焼き','ビーフ'], icon: '🥩' },
  { words: ['カレー','curry'], icon: '🍛' },
  { words: ['パスタ','pasta','スパゲ'], icon: '🍝' },
  { words: ['チャーハン','炒飯'], icon: '🍚' },
  { words: ['餃子','ギョーザ','ぎょうざ'], icon: '🥟' },
  { words: ['サンドイッチ','sandwich'], icon: '🥪' },
  { words: ['そば','蕎麦','うどん'], icon: '🍜' },
  { words: ['寿司','すし','sushi'], icon: '🍣' },
  { words: ['おにぎり','握り'], icon: '🍙' },
  { words: ['みそ','味噌','スープ','soup'], icon: '🍲' },
  { words: ['ポテト','potato'], icon: '🍟' },
  { words: ['とんかつ','トンカツ','カツ','コロッケ'], icon: '🥩' },
];

function getIcon(name) {
  const n = name.toLowerCase();
  for (const m of ICON_MAP) {
    for (const w of m.words) { if (n.includes(w.toLowerCase())) return m.icon; }
  }
  return '🍱';
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function load() { try { const r = localStorage.getItem(KEY); if (r) state = JSON.parse(r); } catch(e) {} }
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} }

function fmt(ts) {
  const d = new Date(ts);
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function totalCount(item) { return item.batches.reduce((s,b) => s + b.remaining, 0); }

function makeDots(batches) {
  let h = '';
  let count = 0;
  for (const b of batches) {
    const d = new Date(b.date + 'T00:00:00');
    const mo = (d.getMonth()+1) + '月';
    const dy = d.getDate() + '日';
    for (let i = 0; i < b.remaining; i++) {
      if (count >= 14) { h += `<span style="font-size:11px;color:var(--text3);align-self:center;">+${totalRemaining(batches,count)}</span>`; return h; }
      h += `<span class="dot active"><span class="dot-month">${mo}</span><span class="dot-day">${dy}</span></span>`;
      count++;
    }
    const eaten = b.total - b.remaining;
    for (let i = 0; i < eaten; i++) {
      if (count >= 14) { h += `<span style="font-size:11px;color:var(--text3);align-self:center;">+${totalRemaining(batches,count)}</span>`; return h; }
      h += `<span class="dot eaten"><span class="dot-month">${mo}</span><span class="dot-day">${dy}</span></span>`;
      count++;
    }
  }
  return h;
}

function totalRemaining(batches, shown) {
  const total = batches.reduce((s,b) => s + b.total, 0);
  return total - shown;
}

function renderStock() {
  const el = document.getElementById('tab-stock');
  if (state.items.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🍱</div>まだお弁当が登録されていません。<br>「作り置き登録」タブから追加してください。</div>`;
    updateHeader();
    return;
  }
  el.innerHTML = state.items.map((item, i) => {
    const cnt = totalCount(item);
    return `
      <div class="stock-card">
        <div class="stock-header">
          <span class="stock-icon">${getIcon(item.name)}</span>
          <span class="stock-name">${item.name}</span>
          <span class="stock-count">${cnt}個</span>
        </div>
        <div class="dots-area">${makeDots(item.batches)}</div>
        <div class="stock-footer">
          <button class="eat-btn" onclick="eat(${i})" ${cnt===0?'disabled':''}>✓ 食べた（1個消費）</button>
          <button class="add-stock-btn" onclick="openModal(${i})" aria-label="追加">＋</button>
          <button class="del-btn" onclick="deleteItem(${i})" aria-label="削除">🗑</button>
        </div>
      </div>`;
  }).join('');
  updateHeader();
}

function updateHeader() {
  const total = state.items.reduce((s,i) => s + totalCount(i), 0);
  const kinds = state.items.filter(i => totalCount(i) > 0).length;
  document.getElementById('header-sub').textContent = `合計 ${total}個 / ${kinds}種類`;
}

function renderLog() {
  const el = document.getElementById('tab-log');
  if (state.log.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>まだ記録はありません。</div>`;
    return;
  }
  el.innerHTML = [...state.log].reverse().slice(0, 50).map(l => `
    <div class="log-item">
      <span class="log-text">${l.action==='eat'?'🍱 消費':'📦 追加'} ${l.name}${l.delta?' +'+l.delta+'個':''}</span>
      <span class="log-time">${fmt(l.time)}</span>
    </div>`).join('');
}

function updateDl() {
  const dl = document.getElementById('menu-dl');
  dl.innerHTML = [...new Set(state.items.map(i => i.name))].map(n => `<option value="${n}">`).join('');
}

function switchTab(name) {
  currentTab = name;
  ['stock','register','log'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((btn, i) => {
    btn.classList.toggle('active', ['stock','register','log'][i] === name);
  });
  if (name === 'stock') renderStock();
  if (name === 'log') renderLog();
}

function addStock() {
  const name = document.getElementById('new-name').value.trim();
  const count = parseInt(document.getElementById('new-count').value) || 0;
  const date = document.getElementById('new-date').value || todayStr();
  if (!name || count <= 0) { showToast('名前と個数を入力してください'); return; }
  const ex = state.items.find(i => i.name === name);
  const batch = { date, total: count, remaining: count };
  if (ex) {
    const eb = ex.batches.find(b => b.date === date);
    if (eb) { eb.total += count; eb.remaining += count; } else { ex.batches.push(batch); }
  } else {
    state.items.push({ name, batches: [batch] });
  }
  state.log.push({ action: 'add', name, delta: count, time: Date.now() });
  save(); updateDl();
  document.getElementById('new-name').value = '';
  document.getElementById('new-count').value = '5';
  document.getElementById('new-date').value = todayStr();
  showToast('✓ ' + name + ' を ' + count + '個 登録しました');
  switchTab('stock');
}

function eat(i) {
  const item = state.items[i];
  const batch = item.batches.find(b => b.remaining > 0);
  if (!batch) return;
  batch.remaining -= 1;
  state.log.push({ action: 'eat', name: item.name, time: Date.now() });
  save(); renderStock();
  showToast('🍱 ' + item.name + ' を1個消費しました');
}

function deleteItem(i) {
  const name = state.items[i].name;
  if (!confirm(name + ' を削除しますか？')) return;
  state.log.push({ action: 'del', name, time: Date.now() });
  state.items.splice(i, 1);
  save(); renderStock(); updateDl();
}

function openModal(i) {
  modalTarget = i;
  document.getElementById('modal-title').textContent = state.items[i].name + ' に追加';
  document.getElementById('modal-count').value = '5';
  document.getElementById('modal-date').value = todayStr();
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  modalTarget = null;
}
function confirmModal() {
  if (modalTarget === null) return;
  const count = parseInt(document.getElementById('modal-count').value) || 0;
  const date = document.getElementById('modal-date').value || todayStr();
  if (count <= 0) return;
  const item = state.items[modalTarget];
  const eb = item.batches.find(b => b.date === date);
  if (eb) { eb.total += count; eb.remaining += count; } else { item.batches.push({ date, total: count, remaining: count }); }
  state.log.push({ action: 'add', name: item.name, delta: count, time: Date.now() });
  save(); renderStock();
  document.getElementById('modal').classList.remove('open');
  modalTarget = null;
  showToast('✓ ' + item.name + ' を ' + count + '個 追加しました');
}

document.getElementById('new-date').value = todayStr();
load(); renderStock(); updateDl();
</script>
</body>
</html>
